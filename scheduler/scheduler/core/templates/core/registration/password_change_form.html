{% extends 'core/base.html' %}
{% load static %}

{% block title %}Change Password{% endblock %}

{% block extra_css %}
<style>
    /* 1. The Blue-Grey Card Container */
    .password-card {
        background-color: #7a92ac; /* Matching the slate-blue from your header/screenshot */
        color: white;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25); /* Deep shadow like the image */
        max-width: 500px;
        margin: 60px auto;
        font-family: sans-serif;
    }

    .password-card h2 {
        margin-top: 0;
        margin-bottom: 30px;
        font-weight: 500;
        font-size: 24px;
        color: white;
    }

    /* 2. Labels and Text */
    .password-card label {
        display: block;
        margin-bottom: 8px;
        font-size: 15px;
        font-weight: normal;
        color: white;
    }

    /* 3. Inputs */
    .password-card input[type="password"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border: none;
        border-radius: 4px;
        font-size: 15px;
        box-sizing: border-box;
    }

    .password-card input[type="password"]:focus {
        outline: 2px solid white;
        outline-offset: 2px;
    }

    /* 4. Django's auto-generated bullet points and help text */
    .password-card ul {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.9);
        margin-top: -10px;
        margin-bottom: 20px;
        padding-left: 20px;
        line-height: 1.5;
    }

    .password-card ul li {
        margin-bottom: 4px;
    }

    .password-card .helptext {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.8);
        display: block;
        margin-top: -15px;
        margin-bottom: 25px;
    }

    /* 5. Full-Width Light Button */
    .btn-update {
        width: 100%;
        background-color: #e2e4e9; /* Light grey to match your screenshot */
        color: #2c3e50; /* Dark text for contrast */
        border: none;
        padding: 14px;
        border-radius: 4px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
        margin-top: 10px;
    }

    .btn-update:hover {
        background-color: #d1d4db;
    }

    /* 6. Subtle Cancel Link centered below */
    .cancel-wrapper {
        text-align: center;
        margin-top: 20px;
    }

    .btn-cancel-link {
        color: white;
        text-decoration: none;
        font-size: 14px;
        opacity: 0.8;
        transition: opacity 0.2s;
    }

    .btn-cancel-link:hover {
        text-decoration: underline;
        opacity: 1;
    }
</style>
{% endblock %}

{% block content %}
<div class="password-card">
    <h2>Change Password</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn-update">Update Password</button>

        <div class="cancel-wrapper">
            <a href="{% url 'account_details' %}" class="btn-cancel-link">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
