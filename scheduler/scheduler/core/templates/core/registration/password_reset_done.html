{% extends 'core/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="main-container" style="display: flex; justify-content: center; align-items: center; height: 80vh;">

    <div class="auth-card login-card" style="background-color: #7393B3; padding: 40px; border-radius: 6px; width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">

        <h2 style="color: white; margin-bottom: 10px;">Success!</h2>

        <p style="color: white; font-size: 14px; opacity: 0.9; margin-bottom: 25px;">
            Your password has been successfully updated. You can now use your new password to sign in.
        </p>

        <a href="{% url 'login' %}" class="sign-in-btn" style="text-decoration: none; text-align: center; display: block; background-color: #cdd2de; color: #333; padding: 12px; border-radius: 4px; font-weight: 500;">
            Log In
        </a>

    </div>
</div>
{% endblock %}
