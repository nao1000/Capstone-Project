{% extends 'core/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="main-container">
    <div class="auth-card login-card">
        <h2>Reset Password</h2>
        <p style="color: white; font-size: 14px; margin-bottom: 15px; opacity: 0.8;">
            Forgot your password? Enter your email address below.
        </p>

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label for="id_email">Email Address</label>
                <input type="email" name="email" id="id_email" placeholder="Enter your email" required>
            </div>
            <br>
            <button type="submit" class="sign-in-btn">Send Reset Link</button>
        </form>

        <div class="toggle-link" style="margin-top: 15px;">
            <a href="{% url 'login' %}">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
